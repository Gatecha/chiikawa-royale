<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiikawa Royale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;600;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:   #ff4f73;
      --gold:   #ffd86f;
      --bg:     #080809;
      --panel:  rgba(8,8,12,0.88);
      --border: rgba(255,255,255,0.07);
      --muted:  rgba(255,255,255,0.42);
      --fh: 'DynaPuff', cursive;
      --fb: 'Fredoka', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--fb); background: var(--bg); color: #fff; user-select: none; -webkit-user-select: none; }
    button { font-family: var(--fb); }

    /* ── SCREENS ── */
    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .screen.visible { opacity: 1; pointer-events: all; }

    /* ══════════════════════════════════════════════════
       SHARED TITLE BAR
    ══════════════════════════════════════════════════ */
    .tb {
      height: 32px;
      background: transparent;
      border-bottom: none;
      display: flex; align-items: center; justify-content: space-between;
      -webkit-app-region: drag;
      position: absolute; top: 0; left: 0; right: 0; z-index: 200;
    }
    .tb-l { display: flex; align-items: center; gap: 7px; padding-left: 10px; -webkit-app-region: no-drag; }
    .tb-icon { width: 16px; height: 16px; object-fit: contain; }
    .tb-title { font-family: var(--fh); font-size: 10px; color: var(--gold); letter-spacing: 0.07em; }
    .tb-r { display: flex; -webkit-app-region: no-drag; }
    .tb-btn {
      -webkit-app-region: no-drag;
      width: 46px; height: 32px;
      background: transparent; border: none; color: var(--muted);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .tb-btn:hover           { background: rgba(255,255,255,0.08); color: #fff; }
    .tb-btn.close:hover     { background: #bf2626; color: #fff; }
    .tb-btn svg             { width: 11px; height: 11px; fill: currentColor; pointer-events: none; }

    /* ══════════════════════════════════════════════════
       INSTALLER / LOADING SCREEN
    ══════════════════════════════════════════════════ */
    #installerScreen {
      background:
        radial-gradient(ellipse 65% 45% at 50% -5%, rgba(255,79,115,0.2) 0%, transparent 68%),
        var(--bg);
    }
    .inst-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; padding: 42px 40px 28px;
    }

    /* Characters */
    .inst-chars { display: flex; align-items: flex-end; justify-content: center; margin-bottom: -12px; }
    .inst-chars img { width: 84px; height: 84px; object-fit: contain; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.65)); }
    .inst-chars img:nth-child(1) { transform: rotate(-9deg) translateY(4px); }
    .inst-chars img:nth-child(2) { transform: rotate(-2deg) scale(1.1); z-index: 1; }
    .inst-chars img:nth-child(3) { transform: rotate(2deg) scale(1.1); z-index: 1; }
    .inst-chars img:nth-child(4) { transform: rotate(9deg) translateY(4px); }

    /* Logo */
    .inst-logo { width: 176px; object-fit: contain; margin-bottom: 4px; animation: logoFloat 3s ease-in-out infinite; filter: drop-shadow(0 0 28px rgba(255,79,115,0.55)); }
    @keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .inst-label { font-family: var(--fh); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 22px; text-transform: uppercase; }

    /* Progress bar */
    .prog-wrap { width: 340px; display: flex; flex-direction: column; gap: 7px; }
    .prog-track { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
    .prog-fill  { height: 100%; width: 0%; background: linear-gradient(90deg, var(--pink), #ff8fab); border-radius: 99px; transition: width 0.3s; }
    .prog-status { font-size: 11px; color: var(--muted); }

    /* PLAY button (installer) */
    .btn-iplay {
      display: none;
      font-family: var(--fh); font-size: 18px; letter-spacing: 0.1em; color: #fff;
      background: linear-gradient(135deg, var(--pink) 0%, #c8375a 100%);
      border: none; border-radius: 10px; padding: 13px 80px;
      cursor: pointer; box-shadow: 0 4px 30px rgba(255,79,115,0.5);
      transition: transform 0.14s, box-shadow 0.14s;
      position: relative; overflow: hidden;
    }
    .btn-iplay::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 55%); pointer-events:none; }
    .btn-iplay:hover  { transform: translateY(-2px); box-shadow: 0 8px 38px rgba(255,79,115,0.65); }
    .btn-iplay:active { transform: translateY(0); }

    /* Desktop shortcut checkbox */
    .shortcut-row {
      display: none;
      align-items: center; gap: 7px;
      margin-top: 11px; cursor: pointer;
    }
    .shortcut-row input[type="checkbox"] { width: 13px; height: 13px; accent-color: var(--pink); cursor: pointer; }
    .shortcut-row span { font-size: 11.5px; color: var(--muted); }

    /* ── Custom Installer UI Styles ── */
    .inst-bottom-dock {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    
    .inst-buttons-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 2px;
    }
    
    .btn-custom-inst {
      font-family: var(--fb); font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 20px;
      padding: 9px 24px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .btn-custom-inst:hover { background: rgba(255,255,255,0.12); color: #fff; }
    
    .btn-start-inst {
      font-family: var(--fh); font-size: 13px; letter-spacing: 0.05em; color: #000;
      background: #fff; border: none; border-radius: 20px;
      padding: 9px 34px; cursor: pointer; font-weight: 700;
      box-shadow: 0 4px 18px rgba(255,255,255,0.25);
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
    }
    .btn-start-inst:hover { transform: translateY(-1.5px); background: #f0f0f0; box-shadow: 0 6px 24px rgba(255,255,255,0.35); }
    .btn-start-inst:active { transform: translateY(0); }
    .btn-start-inst:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    
    .inst-terms-row {
      display: flex; align-items: center; gap: 7px; cursor: pointer;
    }
    .inst-terms-row input[type="checkbox"] { width: 13px; height: 13px; accent-color: var(--pink); cursor: pointer; }
    .inst-terms-row span { font-size: 11.5px; color: var(--muted); }
    .inst-terms-row span a { color: var(--pink); text-decoration: none; }
    .inst-terms-row span a:hover { text-decoration: underline; }
    
    .inst-path-info {
      text-align: center; margin-top: 6px;
    }
    .inst-path-info .loc { font-size: 11.5px; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
    .inst-path-info .space { font-size: 10.5px; color: var(--muted); letter-spacing: 0.02em; }

    /* Custom installation path modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.on { opacity: 1; pointer-events: all; }
    
    .modal-box {
      background: #101014; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      padding: 24px 28px; width: 440px; max-width: 90vw;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px; background: transparent; border: none;
      color: var(--muted); font-size: 16px; cursor: pointer; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
    }
    .modal-close:hover { background: rgba(255,255,255,0.08); color: #fff; }
    
    .modal-title { font-family: var(--fb); font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    
    .path-input-group {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .path-input-box {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 7px 12px; color: rgba(255,255,255,0.85); font-family: var(--fb);
      font-size: 12px; outline: none;
    }
    .btn-change-path {
      background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 6px;
      color: #fff; font-family: var(--fb); font-size: 11.5px; padding: 0 14px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-change-path:hover { background: rgba(255,255,255,0.15); }
    
    .modal-space-info { font-size: 11px; color: var(--muted); margin-bottom: 16px; display: flex; gap: 14px; }
    
    .modal-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
    .modal-option-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .modal-option-row input { width: 13px; height: 13px; accent-color: var(--pink); cursor: pointer; }
    .modal-option-row span { font-size: 12px; color: rgba(255,255,255,0.7); }
    
    .btn-modal-continue {
      font-family: var(--fh); font-size: 13px; letter-spacing: 0.05em; color: #000;
      background: #fff; border: none; border-radius: 20px; width: 100%; height: 36px;
      cursor: pointer; font-weight: 700; transition: background 0.15s;
    }
    .btn-modal-continue:hover { background: #e2e2e2; }

    /* ══════════════════════════════════════════════════
       LAUNCHER SCREEN  (NTE-style)
    ══════════════════════════════════════════════════ */
    #launcherScreen { background: var(--bg); }

    .lnc-body {
      flex: 1; position: relative; overflow: hidden;
    }

    /* Full-bleed video */
    .bg-vid {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block; z-index: 0;
    }

    /* Cinematic vignette */
    .vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        linear-gradient(to right, rgba(0,0,0,0.45) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.2) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 30%, transparent 55%, rgba(0,0,0,0.85) 100%);
    }

    /* ── TOP-LEFT BRAND ── */
    .overlay-tl {
      position: absolute; top: 12px; left: 14px; z-index: 10;
    }
    .brand-img { width: 110px; object-fit: contain; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.8)); }

    /* ── TOP-RIGHT CHIPS ── */
    .overlay-tr {
      position: absolute; top: 10px; right: 120px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
    }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px 5px 9px;
      background: rgba(6,6,9,0.72); backdrop-filter: blur(14px);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background 0.14s, color 0.14s;
    }
    .chip:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .chip svg   { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

    /* ── RIGHT SOCIAL STRIP ── */
    .soc-strip {
      position: absolute; right: 0; top: 0; bottom: 0; width: 44px; z-index: 10;
      background: rgba(4,4,7,0.6); backdrop-filter: blur(18px);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .soc-btn {
      width: 36px; height: 36px; background: transparent; border: none;
      color: rgba(255,255,255,0.38); border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.14s, color 0.14s;
    }
    .soc-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.9); }
    .soc-btn svg   { width: 16px; height: 16px; fill: currentColor; }

    /* ── BOTTOM DOCK ── */
    .bottom-dock {
      position: absolute; bottom: 0; left: 0; right: 44px; z-index: 10;
      padding: 0 16px 14px;
      background: linear-gradient(to top, rgba(5,5,8,0.97) 0%, rgba(5,5,8,0.82) 55%, transparent 100%);
    }

    /* Tabs */
    .dock-tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 9px; }
    .dtab {
      padding: 8px 14px 7px; background: transparent; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--muted); font-family: var(--fb); font-size: 12px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em;
      transition: color 0.14s, border-color 0.14s;
    }
    .dtab.active { color: #fff; border-bottom-color: var(--pink); }
    .dtab:hover:not(.active) { color: rgba(255,255,255,0.72); }

    /* Bottom two-column */
    .dock-cols { display: flex; align-items: flex-end; gap: 20px; }

    /* News col */
    .news-col { flex: 1; min-width: 0; }
    .news-row {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 5px; border-radius: 4px;
      cursor: pointer; transition: background 0.12s;
    }
    .news-row:hover { background: rgba(255,255,255,0.05); }
    .ntag {
      flex-shrink: 0; padding: 1px 6px; border-radius: 3px;
      font-size: 8px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .ntag.update { background: rgba(59,130,246,0.22); color: #93c5fd; }
    .ntag.event  { background: rgba(168,85,247,0.22); color: #d8b4fe; }
    .ntag.notice { background: rgba(245,158,11,0.22); color: #fcd34d; }
    .ntitle { flex: 1; font-size: 11px; color: rgba(255,255,255,0.78); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ndate  { flex-shrink: 0; font-size: 10px; color: var(--muted); }

    /* Play col */
    .play-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

    /* Update progress */
    .upd-wrap { display: none; flex-direction: column; gap: 4px; min-width: 200px; }
    .upd-wrap.on { display: flex; }
    .upd-track { height: 3px; background: rgba(255,255,255,0.12); border-radius: 99px; overflow: hidden; }
    .upd-fill  { height: 100%; width: 0%; background: linear-gradient(90deg,#f5a623,#ffd86f); border-radius: 99px; transition: width 0.3s; }
    .upd-lbl   { font-size: 10px; color: var(--muted); text-align: right; }

    /* PLAY/UPDATE button */
    .btn-play {
      font-family: var(--fh); font-size: 15px; letter-spacing: 0.1em; color: #fff;
      background: linear-gradient(135deg, var(--pink) 0%, #c8375a 100%);
      border: none; border-radius: 8px; height: 40px; padding: 0 38px; min-width: 130px;
      cursor: pointer; box-shadow: 0 4px 22px rgba(255,79,115,0.42);
      transition: transform 0.14s, box-shadow 0.14s;
      position: relative; overflow: hidden; white-space: nowrap;
    }
    .btn-play::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.16) 0%,transparent 55%); pointer-events:none; }
    .btn-play:hover   { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,79,115,0.58); }
    .btn-play:active  { transform: translateY(0); }
    .btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-play.upd     { background: linear-gradient(135deg,#f5a623,#c8720a); box-shadow: 0 4px 22px rgba(245,166,35,0.42); }
    .btn-play.upd:hover { box-shadow: 0 8px 30px rgba(245,166,35,0.58); }

    /* Version info */
    .ver-info { text-align: right; }
    .ver-info span { display: block; font-size: 10px; color: var(--muted); line-height: 1.5; }
    .ver-info .new { color: var(--gold); font-weight: 700; }

    /* Update badge dot */
    .upd-dot {
      display: none; position: absolute; top: -5px; right: -5px;
      width: 11px; height: 11px; background: var(--gold); border-radius: 50%;
      border: 2px solid var(--bg); animation: badgePop 1.6s ease-in-out infinite;
    }
    @keyframes badgePop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

    /* ── LAUNCH OVERLAY ── */
    .launch-ov {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
    }
    .launch-ov.on { opacity: 1; pointer-events: all; }
    .spin { width: 40px; height: 40px; border: 3px solid rgba(255,79,115,0.18); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .launch-txt { font-family: var(--fh); font-size: 12px; color: var(--muted); letter-spacing: 0.14em; }

    /* ── CUSTOM ALERT ── */
    .alert-ov { position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,0.78); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .alert-ov.hidden { display: none; }
    .alert-card { background: #111116; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 26px 30px; width: 360px; max-width: 90vw; box-shadow: 0 24px 64px rgba(0,0,0,0.8); text-align: center; }
    .alert-ttl { font-family: var(--fh); font-size: 13px; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 10px; }
    .alert-msg { font-size: 12.5px; color: var(--muted); line-height: 1.65; margin-bottom: 18px; }
    .alert-ok  { padding: 8px 32px; background: linear-gradient(135deg,var(--pink),#c8375a); border: none; border-radius: 7px; color: #fff; font-family: var(--fh); font-size: 12px; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.14s; }
    .alert-ok:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     LOADING / INSTALLER SCREEN
════════════════════════════════════════ -->
<div id="installerScreen" class="screen visible">
  <div class="tb">
    <div class="tb-l"></div>
    <div class="tb-r">
      <button class="tb-btn" id="minInstBtn" title="Minimize">
        <svg viewBox="0 0 10 2"><rect y="0" width="10" height="2"/></svg>
      </button>
      <button class="tb-btn close" id="closeInstBtn" title="Close">
        <svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="inst-body">
    <div class="inst-chars">
      <img src="assets/cards/chiikawa.png"  alt="Chiikawa">
      <img src="assets/cards/hachiware.png" alt="Hachiware">
      <img src="assets/cards/usagi.png"     alt="Usagi">
      <img src="assets/cards/momonga.png"   alt="Momonga">
    </div>
    <img src="chiikawa-royale-logo.png" class="inst-logo" alt="Chiikawa Royale">
    <div class="inst-label" id="instLabel">PC CLIENT — STARTING UP</div>

    <!-- PLAY button (shows only for installed app loading screen) -->
    <button class="btn-iplay" id="instPlayBtn">PLAY</button>
    
    <!-- Desktop shortcut checkbox (shows only for installed app loading screen) -->
    <label class="shortcut-row" id="shortcutRow" for="shortcutCb">
      <input type="checkbox" id="shortcutCb" checked>
      <span>Add to Desktop shortcut</span>
    </label>

    <!-- Post-installation Launch controls -->
    <button class="btn-iplay" id="btnLaunchApp" style="display: none;">LAUNCH APP</button>
    <label class="shortcut-row" id="postShortcutRow" style="display: none;" for="postShortcutCb">
      <input type="checkbox" id="postShortcutCb" checked>
      <span>Add shortcut to desktop</span>
    </label>

    <!-- Loading progress wrapper -->
    <div class="prog-wrap" id="progWrap">
      <div class="prog-track">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <div class="prog-status" id="progStatus">Loading game components...</div>
    </div>

    <!-- ── Custom Installer Controls ── -->
    <div class="inst-bottom-dock" id="instBottomDock" style="display: none;">
      <!-- Buttons -->
      <div class="inst-buttons-row">
        <button class="btn-custom-inst" id="btnCustomInst">CUSTOM INSTALL</button>
        <button class="btn-start-inst" id="btnStartInst">START INSTALL</button>
      </div>

      <!-- Agreement checkbox -->
      <label class="inst-terms-row" for="termsCb">
        <input type="checkbox" id="termsCb" checked>
        <span>I have read and agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>.</span>
      </label>

      <!-- Path & space info -->
      <div class="inst-path-info">
        <div class="loc" id="lblInstallPath">Installation location: C:\Games\Chiikawa Royale</div>
        <div class="space">Available space: 100.0GB &nbsp;|&nbsp; Required space: 250MB</div>
      </div>
    </div>

  </div>
</div>

<!-- ── Custom Installation Path Modal ── -->
<div class="modal-overlay" id="customPathModal">
  <div class="modal-box">
    <button class="modal-close" id="btnModalClose">&times;</button>
    <div class="modal-title">Choose installation path</div>
    
    <div class="path-input-group">

</div>

<!-- ════════════════════════════════════════

        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

      <!-- Tabs -->

        <button class="dtab active" data-tab="news">News</button>

        <button class="dtab" data-tab="events">Events</button>
      </div>

      <!-- Two columns: news + play -->
      <div class="dock-cols">
        <!-- News list -->
        <div class="news-col" id="newsCol"></div>

        <!-- Play column -->
        <div class="play-col" style="position: relative;">
          <!-- Update progress wrapper -->
          <div class="upd-wrap" id="updWrap">
            <div class="upd-track">
              <div class="upd-fill" id="updFill"></div>
            </div>
            <div class="upd-lbl" id="updLbl">Connecting to update server...</div>
          </div>

          <!-- Play button -->
          <button class="btn-play" id="playBtn">PLAY</button>
          
          <!-- Update badge dot -->
          <div class="upd-dot" id="updDot"></div>

          <!-- Version info -->
          <div class="ver-info">
            <span id="curVer">Version: --</span>
            <span id="latVer">Latest: --</span>
          </div>
        </div>
<script>
const $id = (id) => document.getElementById(id);
const installerScreen = $id('installerScreen');
const launcherScreen  = $id('launcherScreen');
const launchOv        = $id('launchOv');
const instPlayBtn     = $id('instPlayBtn');
const shortcutRow     = $id('shortcutRow');
const shortcutCb      = $id('shortcutCb');
const progWrap        = $id('progWrap');
const progFill        = $id('progFill');
const progStatus      = $id('progStatus');
const playBtn         = $id('playBtn');
const updDot          = $id('updDot');
const updWrap         = $id('updWrap');
const updFill         = $id('updFill');
const updLbl          = $id('updLbl');
const curVer          = $id('curVer');
const latVer          = $id('latVer');

/* ── Custom Installer Refs ────────────────────── */
const instBottomDock  = $id('instBottomDock');
const btnCustomInst   = $id('btnCustomInst');
const btnStartInst    = $id('btnStartInst');
const termsCb         = $id('termsCb');
const lblInstallPath  = $id('lblInstallPath');
const customPathModal = $id('customPathModal');
const btnModalClose   = $id('btnModalClose');
const txtPathInput    = $id('txtPathInput');
const btnSelectFolder = $id('btnSelectFolder');
const modalShortcutCb = $id('modalShortcutCb');
const btnModalContinue = $id('btnModalContinue');
const btnLaunchApp    = $id('btnLaunchApp');
const postShortcutRow = $id('postShortcutRow');
const postShortcutCb  = $id('postShortcutCb');

/* ── Electron API ─────────────────────────────── */
const api        = (typeof window.electronAPI !== 'undefined') ? window.electronAPI : null;
const isElectron = !!(api && api.isElectron);

/* ── State ────────────────────────────────────── */
let updateAvailable = false;
let isUpdating      = false;
let needsRestart    = false;
let installPath     = (api && api.getDefaultInstallPath) ? api.getDefaultInstallPath() : "C:\\Games\\Chiikawa Royale";
let installedExe    = '';
let installedTargetDir = '';

/* ── News Data ────────────────────────────────── */
const newsData = {
  news: [
    { title: 'Battle Royale Update — Fullscreen Countdown & Logo Fix', date: '06/27', tag: 'update' },
    { title: 'New Magical Chiikawa Limited Draw Event Live',           date: '06/25', tag: 'event'  },
    { title: 'Alpha server stability survey details',                  date: '06/23', tag: 'notice' },
  ],
  notices: [
    { title: 'System Maintenance & Optimization Schedule',            date: '06/26', tag: 'notice' },
    { title: 'Third-party cheat tools warning and bans',              date: '06/15', tag: 'notice' },
    { title: 'Community guidelines alignment updates',                date: '04/10', tag: 'notice' },
  ],
  events: [
    { title: 'Discord Alpha Test — Get Exclusive Bomb Skin!',         date: '06/25', tag: 'event' },
    { title: 'Weekly Gacha Spins Leaderboard Event',                  date: '06/18', tag: 'event' },
    { title: 'Double XP & Coin Drops Weekend',                        date: '05/12', tag: 'event' },
  ],
};

/* ── UI Helpers ───────────────────────────────── */
function showAlert(title, msg, onOk = null) {
  $id('alertTitle').textContent = title;
  $id('alertBody').innerHTML    = msg;
  
  // Clean bind OK button click to avoid multiple triggers
  const originalAlertOk = $id('alertOk');
  const newAlertOk = originalAlertOk.cloneNode(true);
  originalAlertOk.parentNode.replaceChild(newAlertOk, originalAlertOk);
  
  newAlertOk.addEventListener('click', () => {
    $id('alertOv').classList.add('hidden');
    if (onOk) onOk();
  });
  
  $id('alertOv').classList.remove('hidden');
}

function loadNews(cat) {
  const col = $id('newsCol');
  if (!col) return;
  col.innerHTML = '';
  (newsData[cat] || []).forEach(item => {
    const div = document.createElement('div');
    div.className = 'news-row';
    div.innerHTML =
      `<span class="ntag ${item.tag}">${item.tag}</span>` +
      `<span class="ntitle">${item.title}</span>` +
      `<span class="ndate">${item.date}</span>`;
    div.addEventListener('click', () => showAlert(item.title,
      `Category: ${item.tag.toUpperCase()}<br>Date: ${item.date}/2026<br><br>Check our Discord for the latest details.`));
    col.appendChild(div);
  });
}

function openSocial(p) {
  if (p === 'discord') { window.open('https://discord.gg/qpJRXkKzZ3', '_blank'); }
  else showAlert('SOCIAL', `Launching ${p.toUpperCase()}... (Locked in Alpha)`);
}

/* ══════════════════════════════════════════════
   WINDOW CONTROLS (minimize / close)
══════════════════════════════════════════════ */
function bindWin(id, fn) {
  const el = $id(id);
  if (!el) return;
  el.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); }, true);
  el.addEventListener('click',     (e) => { e.stopPropagation(); fn(); },               true);
}

bindWin('minInstBtn',    () => { if (isElectron) api.minimize(); });
bindWin('closeInstBtn',  () => { if (isElectron) api.close(); else window.close(); });
bindWin('minLaunchBtn',  () => { if (isElectron) api.minimize(); });
bindWin('closeLaunchBtn',() => { if (isElectron) api.close(); else window.close(); });

/* ══════════════════════════════════════════════
   LOADING BAR
══════════════════════════════════════════════ */
function startLoader() {
  const DURATION = 2000, INTERVAL = 40;
  const steps = [
    { at: 0,  text: 'Checking local files...' },
    { at: 35, text: 'Verifying game assets...' },
    { at: 70, text: 'Connecting to servers...' },
    { at: 95, text: 'Ready!' },
  ];
  let elapsed = 0;
  const ticker = setInterval(() => {
    elapsed += INTERVAL;
    const pct = Math.min(100, Math.round((elapsed / DURATION) * 100));
    progFill.style.width = pct + '%';
    let label = 'Loading...';
    for (let i = steps.length - 1; i >= 0; i--) { if (pct >= steps[i].at) { label = steps[i].text; break; } }
    progStatus.textContent = label + ' (' + pct + '%)';
    if (pct >= 100) {
      clearInterval(ticker);
      progStatus.textContent = 'Verification complete!';
      setTimeout(() => {
        progWrap.style.display  = 'none';
        instPlayBtn.style.display = 'block';
        shortcutRow.style.display = 'flex';
      }, 300);
    }
  }, INTERVAL);
}

/* ══════════════════════════════════════════════
   CUSTOM INSTALLER TRIGGER
══════════════════════════════════════════════ */
async function startInstallation() {
  if (!termsCb.checked) return;
  
  // Disable UI and show progress
  instBottomDock.style.display = 'none';
  progWrap.style.display = 'block';
  progFill.style.width = '0%';
  progStatus.textContent = 'Initializing setup...';
  $id('instLabel').textContent = 'INSTALLING GAME...';
  
  window.onInstallProgress = (data) => {
    progFill.style.width = data.pct + '%';
    progStatus.textContent = `${data.label} (${data.pct}%)`;
  };
  
  try {
    const createShortcut = modalShortcutCb.checked;
    // Pass false to installGame because we defer shortcut creation to "Launch App" button click
    const res = await api.installGame(installPath, false);
    if (!res.success) {
      throw new Error(res.error || 'Unknown setup error.');
    }
    
    // Save results for post-install launching
    installedExe = res.destExe;
    installedTargetDir = res.targetPath;

    // Set progress to 100%
    progFill.style.width = '100%';
    progStatus.textContent = 'Installation complete! (100%)';
    
    setTimeout(() => {
      // Hide progress bar
      progWrap.style.display = 'none';
      
      // Update label to "installed"
      $id('instLabel').textContent = 'installed';
      
      // Show Launch App button and shortcut checkbox
      btnLaunchApp.style.display = 'block';
      postShortcutRow.style.display = 'flex';
      postShortcutCb.checked = createShortcut;
    }, 600);

  } catch (err) {
    showAlert('INSTALLATION FAILED', err.message || 'Setup encountered a write error.');
    progWrap.style.display = 'none';
    instBottomDock.style.display = 'flex';
    $id('instLabel').textContent = 'GAME INSTALLER';
  }
}

/* ══════════════════════════════════════════════
   UPDATE CHECK
══════════════════════════════════════════════ */
async function checkForUpdates() {
  curVer.textContent = 'Version: checking...';
  latVer.textContent = 'Latest:  checking...';
  if (!isElectron || !api.checkForUpdate) {
    curVer.textContent = 'Version: (web mode)';
    latVer.textContent = 'Latest:  N/A';
    return;
  }
  try {
    const r = await api.checkForUpdate();
    const cv = r.currentVersion || 'unknown';
    const cs = r.currentCommit ? r.currentCommit.substring(0, 7) : '?';
    curVer.textContent = `Version: ${cv} (${cs})`;
    if (r.error) { latVer.textContent = 'Latest: (offline)'; return; }
    const ls = r.latestCommit ? r.latestCommit.substring(0, 7) : '?';
    if (r.hasUpdate) {
      updateAvailable = true;
      latVer.textContent = `Latest: ${ls} ↑ UPDATE READY`;
      latVer.classList.add('new');
      playBtn.textContent = 'UPDATE';
      playBtn.classList.add('upd');
      updDot.style.display = 'block';
    } else {
      latVer.textContent = `Latest: ${ls} ✓ Up to date`;
    }
  } catch (e) {
    latVer.textContent = 'Latest: (check failed)';
  }
}

/* ── Initialize Application flow (Skip loading / Install check) ──────────────── */
(function initAppFlow() {
  // Bind tab buttons News Notices Events
  document.querySelectorAll('.dtab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadNews(btn.dataset.tab);
    });
  });
  
  // Bind repair files button
  $id('repairBtn').addEventListener('click', () => {
    showAlert('FILE REPAIR', 'All game assets verified and fully optimized (100%). No issues found.');
  });

  if (!isElectron) {
    startLoader();
    return;
  }

  // Check if game is installed
  const installed = api.isInstalled && api.isInstalled();
  
  if (!installed) {
    // Show custom Game Installer screen
    progWrap.style.display = 'none';
    instBottomDock.style.display = 'flex';
    $id('instLabel').textContent = 'GAME INSTALLER';
    
    // Update default install path dynamically from API
    if (api && api.getDefaultInstallPath) {
      installPath = api.getDefaultInstallPath();
      lblInstallPath.textContent = `Installation location: ${installPath}`;
      txtPathInput.value = installPath;
    }
    
    termsCb.addEventListener('change', () => {
      btnStartInst.disabled = !termsCb.checked;
    });
    
    btnCustomInst.addEventListener('click', () => {
      customPathModal.classList.add('on');
    });
    
    btnModalClose.addEventListener('click', () => {
      customPathModal.classList.remove('on');
    });
    
    btnModalContinue.addEventListener('click', () => {
      customPathModal.classList.remove('on');
    });
    
    btnSelectFolder.addEventListener('click', async () => {
      if (api.selectFolder) {
        const folder = await api.selectFolder();
        if (folder) {
          installPath = folder;
          if (!installPath.endsWith("Chiikawa Royale") && !installPath.endsWith("Chiikawa_Royale")) {
            const pathSep = installPath.includes('/') ? '/' : '\\';
            installPath += pathSep + "Chiikawa Royale";
          }
          txtPathInput.value = installPath;
          lblInstallPath.textContent = `Installation location: ${installPath}`;
        }
      }
    });
    
    btnStartInst.addEventListener('click', startInstallation);
  } else {
    // Check if launched from shortcut and skip loading screen
    const shouldSkip = api.shouldSkipLoading && api.shouldSkipLoading();
    if (shouldSkip) {
      installerScreen.classList.remove('visible');
      launcherScreen.classList.add('visible');
      loadNews('news');
      checkForUpdates();
    } else {
      startLoader();
    }
  }
})();

/* ══════════════════════════════════════════════
   INSTALLER → LAUNCHER TRANSITION (Already Installed Flow)
══════════════════════════════════════════════ */
instPlayBtn.addEventListener('click', async () => {
  if (shortcutCb.checked && isElectron && api.createDesktopShortcut) {
    const res = await api.createDesktopShortcut();
    if (!res.success) console.warn('Shortcut creation failed:', res.error);
  }
  installerScreen.classList.remove('visible');
  setTimeout(() => {
    launcherScreen.classList.add('visible');
    loadNews('news');
    checkForUpdates();
  }, 400);
});

// Click handler for "Launch App" button after new installation
btnLaunchApp.addEventListener('click', () => {
  const addShortcut = postShortcutCb.checked;
  if (isElectron && api.launchInstalledGame) {
    api.launchInstalledGame(installedExe, installedTargetDir, addShortcut);
  }
});

/* ══════════════════════════════════════════════
   PLAY / UPDATE BUTTON
══════════════════════════════════════════════ */
playBtn.addEventListener('click', async () => {
  if (needsRestart) {
    if (isElectron && api.relaunch) {
      api.relaunch();
    } else {
      window.location.reload();
    }
    return;
  }
  
  if (isUpdating) return;

  if (updateAvailable) {
    isUpdating = true;
    playBtn.disabled = true;
    updDot.style.display = 'none';
    updWrap.classList.add('on');
    updFill.style.width = '0%';
    updLbl.textContent = 'Starting update...';

    if (isElectron && api.downloadUpdate) {
      const result = await api.downloadUpdate((p) => {
        updFill.style.width = p.pct + '%';
        updLbl.textContent  = p.label || '';
        if (p.stage === 'done') {
          playBtn.textContent = 'RESTART';
          playBtn.disabled = false;
          playBtn.classList.remove('upd');
          playBtn.classList.add('restart-btn');
          updateAvailable = false;
          isUpdating = false;
          needsRestart = true;
          updWrap.classList.remove('on');
          showAlert('UPDATE COMPLETE', 'Game updated successfully! Click RESTART to relaunch the launcher and play.');
        }
        if (p.stage === 'error') {
          isUpdating = false; playBtn.disabled = false;
          updWrap.classList.remove('on');
          playBtn.textContent = 'UPDATE';
          showAlert('UPDATE FAILED', p.label || 'Something went wrong.');
        }
      });
      if (!result.success) {
        isUpdating = false; playBtn.disabled = false;
        updWrap.classList.remove('on');
        showAlert('UPDATE FAILED', result.error || 'Download failed. Check your connection.');
        playBtn.textContent = 'UPDATE';
      }
    } else {
      updWrap.classList.remove('on');
      isUpdating = false; playBtn.disabled = false;
      window.open('https://github.com/Gatecha/chiikawa-royale', '_blank');
    }
  } else {
    // PLAY
    launchOv.classList.add('on');
    $id('launchTxt').textContent = 'STARTING CHIIKAWA ROYALE...';
    if (isElectron && api.startGame) {
      api.startGame();
    } else {
      setTimeout(() => { window.location.href = 'index.html'; }, 1400);
    }
  }
});
</script>

<!-- ── CUSTOM ALERT ── -->
<div id="alertOv" class="alert-ov hidden">
  <div class="alert-card">
    <div id="alertTitle" class="alert-ttl"></div>
    <div id="alertBody" class="alert-msg"></div>
    <button id="alertOk" class="alert-ok">OK</button>
  </div>
</div>
